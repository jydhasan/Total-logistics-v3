<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin — Total Logistics</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    #auth-gate{position:fixed;inset:0;background:#f0f2f5;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:12px;font-size:1rem;color:#555}
    #auth-gate .sp{width:34px;height:34px;border:4px solid #ddd;border-top-color:#2563eb;border-radius:50%;animation:sp .7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    #main-content{display:none}
  </style>
</head>
<body>
  <div id="auth-gate"><div class="sp"></div><span>Verifying access…</span></div>
  <div id="main-content">
  <div class="top-strip">
    <strong>SUPER ADMIN</strong>
    <div>
      <span id="who" style="margin-right:16px;font-size:0.88rem"></span>
      <a href="/">Site</a> ·
      <a href="#" id="logout">Logout</a>
    </div>
  </div>
  <div class="shell">
    <div id="gate" class="err" style="display:none"></div>
    <div class="tabs">
      <button type="button" class="active" data-tab="note">Broadcast to clients</button>
      <button type="button" data-tab="users">Users &amp; assignments</button>
      <button type="button" data-tab="ship">Create shipment</button>
      <button type="button" data-tab="cv">Career applications</button>
      <button type="button" data-tab="visitors">Visitor analytics</button>
    </div>
    <section id="tab-note"></section>
    <section id="tab-users" style="display:none"></section>
    <section id="tab-ship" style="display:none"></section>
    <section id="tab-cv" style="display:none"></section>
    <section id="tab-visitors" style="display:none"></section>
  </div>
  </div><!-- /main-content -->
  <script src="/track.js"></script>
  <script src="common.js"></script>
  <script>
    (async function () {
      // ── Auth Guard ──────────────────────────────────────────────
      const me = await TLL.requireAuth(['superadmin']);
      if (!me) return;

      // ✅ Verified — show page
      document.getElementById('auth-gate').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';

      let adminUsersPage = 1;
      let userPickerCache = null;
      let adminVisitsPage = 1;

      document.getElementById('who').textContent = me.name;
      document.getElementById('logout').addEventListener('click', (e) => {
        e.preventDefault();
        TLL.setToken(null);
        window.location.href = '/portal/login.html';
      });

      document.querySelectorAll('.tabs button').forEach((btn) => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tabs button').forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          const t = btn.getAttribute('data-tab');
          ['note', 'users', 'ship', 'cv', 'visitors'].forEach((x) => {
            document.getElementById('tab-' + x).style.display = x === t ? 'block' : 'none';
          });
          if (t === 'visitors') tabVisits();
        });
      });

      function tabNote() {
        document.getElementById('tab-note').innerHTML = `<div class="card"><h1>Company-wide notification</h1><p style="color:var(--gray)">All clients see this in their portal under Company updates.</p>
          <div id="nok" class="ok" style="display:none"></div>
          <form id="nf">
            <label>Title</label>
            <input name="title" required />
            <label>Message</label>
            <textarea name="body" required></textarea>
            <button class="btn btn-primary" type="submit">Publish</button>
          </form></div>`;
        document.getElementById('nf').addEventListener('submit', async (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          await TLL.api('/api/admin/notifications', {
            method: 'POST',
            body: { title: fd.get('title'), body: fd.get('body') },
          });
          const ok = document.getElementById('nok');
          ok.textContent = 'Published.';
          ok.style.display = 'block';
          e.target.reset();
        });
      }

      async function tabUsers(goPage) {
        if (typeof goPage === 'number' && !Number.isNaN(goPage)) adminUsersPage = goPage;
        const data = await TLL.api('/api/admin/users?page=' + adminUsersPage + '&limit=50');
        adminUsersPage = data.page;
        const users = data.users;
        const managers = data.managers || [];
        if (!userPickerCache) {
          userPickerCache = (await TLL.api('/api/admin/users?picker=1')).users;
        }
        const esc = (s) =>
          String(s || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/"/g, '&quot;');
        const rows =
          users.length > 0
            ? users
                .map((u) => {
                  if (u.role === 'superadmin')
                    return `<tr><td>${esc(u.name)}</td><td>${esc(u.email)}</td><td>superadmin</td><td>—</td></tr>`;
                  if (u.role === 'webadmin')
                    return `<tr><td>${esc(u.name)}</td><td>${esc(u.email)}</td><td>webadmin</td><td>—</td></tr>`;
                  if (u.role === 'manager')
                    return `<tr><td>${esc(u.name)}</td><td>${esc(u.email)}</td><td>manager</td><td>—</td></tr>`;
                  const opts =
                    '<option value="">—</option>' +
                    managers
                      .map((m) => `<option value="${m.id}" ${m.id === u.managerId ? 'selected' : ''}>${esc(m.name)}</option>`)
                      .join('');
                  return `<tr data-user="${u.id}"><td>${esc(u.name)}</td><td>${esc(u.email)}</td><td>client</td><td><select class="mgr-sel">${opts}</select></td></tr>`;
                })
                .join('')
            : '<tr><td colspan="4" style="color:var(--gray);padding:12px">No users yet.</td></tr>';
        const pwdOptions = userPickerCache
          .map((u) => `<option value="${u.id}">${esc(u.name)} — ${esc(u.email)} (${u.role})</option>`)
          .join('');
        const pgPrevDis = data.page <= 1 ? ' disabled' : '';
        const pgNextDis = data.page >= data.totalPages ? ' disabled' : '';
        document.getElementById('tab-users').innerHTML = `<div class="card"><h1>Users</h1>
          <table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Account manager</th></tr></thead><tbody>${rows}</tbody></table>
          <div class="pager" style="display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap">
            <button type="button" class="btn btn-ghost" id="pgPrev"${pgPrevDis}>Previous</button>
            <span style="font-size:0.88rem;color:var(--gray)">Page <strong>${data.page}</strong> of <strong>${data.totalPages}</strong> · ${data.total} users total (${data.limit} per page)</span>
            <button type="button" class="btn btn-ghost" id="pgNext"${pgNextDis}>Next</button>
          </div>
          <hr style="border:none;border-top:1px solid var(--border);margin:24px 0" />
          <h2>Reset user password</h2>
          <p style="color:var(--gray);font-size:0.9rem;margin:0 0 14px">Set a new password for any account (client, manager, or super admin).</p>
          <div id="pwmsg" class="err" style="display:none;margin-bottom:12px"></div>
          <div id="pwok" class="ok" style="display:none;margin-bottom:12px"></div>
          <form id="pwdForm" style="max-width:480px">
            <label for="pwdUser">User</label>
            <select id="pwdUser" name="userId" required>${pwdOptions}</select>
            <label for="pwdNew">New password (min 6 characters)</label>
            <input id="pwdNew" name="password" type="password" autocomplete="new-password" minlength="6" required />
            <button type="submit" class="btn btn-accent" style="margin-top:8px">Update password</button>
          </form>
          <hr style="border:none;border-top:1px solid var(--border);margin:24px 0" />
          <h2>Create user</h2>
          <form id="uf" class="card" style="box-shadow:none;padding:0;border:none">
            <div class="row">
              <div><label>Name</label><input name="name" required /></div>
              <div><label>Email</label><input name="email" type="email" required /></div>
            </div>
            <div class="row">
              <div><label>Password</label><input name="password" type="text" required /></div>
              <div><label>Role</label><select name="role" id="newrole"><option value="client">client</option><option value="manager">manager</option></select></div>
            </div>
            <div id="mgrwrap"><label>Assign manager (clients)</label><select name="managerId" id="newmgr"><option value="">—</option>${managers
              .map((m) => `<option value="${m.id}">${esc(m.name)}</option>`)
              .join('')}</select></div>
            <button class="btn btn-primary" type="submit">Create</button>
          </form>
          <div id="uok" class="ok" style="display:none;margin-top:12px"></div>
          </div>`;
        document.getElementById('pgPrev').addEventListener('click', () => tabUsers(data.page - 1));
        document.getElementById('pgNext').addEventListener('click', () => tabUsers(data.page + 1));
        document.querySelectorAll('.mgr-sel').forEach((sel) => {
          sel.addEventListener('change', async () => {
            const tr = sel.closest('tr');
            const id = tr.getAttribute('data-user');
            await TLL.api('/api/admin/users/' + id, { method: 'PATCH', body: { managerId: sel.value || null } });
          });
        });
        document.getElementById('newrole').addEventListener('change', () => {
          const cl = document.getElementById('newrole').value === 'client';
          document.getElementById('mgrwrap').style.display = cl ? 'block' : 'none';
        });
        document.getElementById('newrole').dispatchEvent(new Event('change'));
        document.getElementById('uf').addEventListener('submit', async (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          const body = {
            name: fd.get('name'),
            email: fd.get('email'),
            password: fd.get('password'),
            role: fd.get('role'),
          };
          if (body.role === 'client' && fd.get('managerId')) body.managerId = fd.get('managerId');
          await TLL.api('/api/admin/users', { method: 'POST', body });
          userPickerCache = null;
          adminUsersPage = 1;
          await tabUsers();
          const uok = document.getElementById('uok');
          if (uok) {
            uok.textContent = 'User created.';
            uok.style.display = 'block';
          }
        });
        document.getElementById('pwdForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const pwmsg = document.getElementById('pwmsg');
          const pwok = document.getElementById('pwok');
          pwmsg.style.display = 'none';
          pwok.style.display = 'none';
          const userId = document.getElementById('pwdUser').value;
          const password = document.getElementById('pwdNew').value;
          try {
            await TLL.api('/api/admin/users/' + encodeURIComponent(userId) + '/password', {
              method: 'PATCH',
              body: { password },
            });
            document.getElementById('pwdNew').value = '';
            pwok.textContent = 'Password updated for that user.';
            pwok.style.display = 'block';
          } catch (err) {
            pwmsg.textContent = err.message || 'Failed to update password.';
            pwmsg.style.display = 'block';
          }
        });
      }

      async function tabShip() {
        const { users } = await TLL.api('/api/admin/users?picker=1');
        const clients = users.filter((u) => u.role === 'client');
        const managers = users.filter((u) => u.role === 'manager');
        document.getElementById('tab-ship').innerHTML = `<div class="card"><h1>New shipment</h1>
          <form id="sf">
            <label>Client</label><select name="clientId" required><option value="">—</option>${clients
              .map((c) => `<option value="${c.id}">${c.name}</option>`)
              .join('')}</select>
            <label>Manager</label><select name="managerId" required><option value="">—</option>${managers
              .map((m) => `<option value="${m.id}">${m.name}</option>`)
              .join('')}</select>
            <label>Title</label><input name="title" required placeholder="e.g. Air freight — DAC to SIN" />
            <label>Description</label><textarea name="description"></textarea>
            <label>Tracking ref (optional)</label><input name="trackingRef" placeholder="Auto if empty" />
            <button class="btn btn-primary" type="submit">Create</button>
          </form>
          <div id="sok" class="ok" style="display:none;margin-top:12px"></div></div>`;
        document.getElementById('sf').addEventListener('submit', async (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          const body = {
            clientId: fd.get('clientId'),
            managerId: fd.get('managerId'),
            title: fd.get('title'),
            description: fd.get('description'),
            trackingRef: fd.get('trackingRef'),
          };
          const r = await TLL.api('/api/admin/shipments', { method: 'POST', body });
          document.getElementById('sok').textContent = 'Created. Ref: ' + r.shipment.trackingRef;
          document.getElementById('sok').style.display = 'block';
          e.target.reset();
        });
      }

      async function loadVisitChart(period) {
        const st = await TLL.api('/api/admin/visits/stats?period=' + encodeURIComponent(period));
        const canvas = document.getElementById('visitChart');
        if (!canvas || typeof Chart === 'undefined') return;
        if (window.__tllVisitChart) {
          window.__tllVisitChart.destroy();
          window.__tllVisitChart = null;
        }
        window.__tllVisitChart = new Chart(canvas, {
          type: 'bar',
          data: {
            labels: st.labels,
            datasets: [
              {
                label: 'Page views',
                data: st.pageviews,
                backgroundColor: 'rgba(37, 99, 235, 0.78)',
                borderRadius: 4,
              },
              {
                label: 'Clicks (batched)',
                data: st.clicks,
                backgroundColor: 'rgba(245, 158, 11, 0.92)',
                borderRadius: 4,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { position: 'top' },
              title: {
                display: true,
                text: 'Page views vs clicks by period',
                font: { size: 14, weight: '600' },
              },
            },
            scales: {
              x: { ticks: { maxRotation: 50, minRotation: 0, autoSkip: true, maxTicksLimit: 18 } },
              y: { beginAtZero: true, ticks: { precision: 0 } },
            },
          },
        });
      }

      async function tabVisits(goPage) {
        if (window.__tllVisitChart) {
          window.__tllVisitChart.destroy();
          window.__tllVisitChart = null;
        }
        if (typeof goPage === 'number' && !Number.isNaN(goPage)) adminVisitsPage = goPage;
        const data = await TLL.api('/api/admin/visits?page=' + adminVisitsPage + '&limit=50');
        adminVisitsPage = data.page;
        const esc = (s) =>
          String(s || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/"/g, '&quot;');
        const rows =
          data.visits && data.visits.length
            ? data.visits
                .map((v) => {
                  const pathDisplay =
                    v.kind === 'click'
                      ? `${esc(v.path)} <span style="color:#b45309;font-size:0.78rem">(${Number(v.clickCount) || 1} clicks)</span>`
                      : esc(v.path);
                  const kindLabel = v.kind === 'click' ? 'clicks' : 'view';
                  return `<tr><td style="white-space:nowrap;font-size:0.82rem">${esc(
                    new Date(v.createdAt).toLocaleString()
                  )}</td><td><code style="font-size:0.78rem">${esc(v.visitorId)}</code></td><td>${pathDisplay}</td><td style="font-size:0.72rem;color:var(--gray)">${kindLabel}</td><td style="font-size:0.78rem;max-width:120px;overflow:hidden;text-overflow:ellipsis" title="${esc(
                    v.ip || ''
                  )}">${esc(v.ip || '—')}</td><td style="font-size:0.75rem;max-width:200px" title="${esc(
                    v.userAgent || ''
                  )}">${esc((v.userAgent || '').slice(0, 72))}${(v.userAgent || '').length > 72 ? '…' : ''}</td><td style="font-size:0.75rem;max-width:140px;overflow:hidden;text-overflow:ellipsis" title="${esc(
                    v.referrer || ''
                  )}">${esc((v.referrer || '').slice(0, 40))}${(v.referrer || '').length > 40 ? '…' : ''}</td></tr>`;
                })
                .join('')
            : '<tr><td colspan="7" style="color:var(--gray);padding:12px">No visits logged yet. Browse the site with the server running; tracking uses the <code>tll_vid</code> cookie.</td></tr>';
        const pgPrevDis = data.page <= 1 ? ' disabled' : '';
        const pgNextDis = data.page >= data.totalPages ? ' disabled' : '';
        document.getElementById('tab-visitors').innerHTML = `<div class="card"><h1>Visitor analytics</h1>
          <p style="color:var(--gray);font-size:0.9rem;line-height:1.55;margin:0 0 16px">
            Each browser receives an HttpOnly cookie <strong>tll_vid</strong>. <strong>Page views</strong> run once per load from <code>track.js</code>; <strong>clicks</strong> are batched (~2.5s) per page. Up to <strong>10,000</strong> recent events kept.
          </p>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px">
            <div class="card" style="padding:14px;margin:0;box-shadow:none;border:1px solid var(--border)"><div style="font-size:1.5rem;font-weight:700;color:var(--navy)">${data.total}</div><div style="font-size:0.82rem;color:var(--gray)">Logged events</div></div>
            <div class="card" style="padding:14px;margin:0;box-shadow:none;border:1px solid var(--border)"><div style="font-size:1.5rem;font-weight:700;color:var(--navy)">${data.uniqueVisitors}</div><div style="font-size:0.82rem;color:var(--gray)">Unique visitor IDs</div></div>
          </div>
          <h2 style="font-size:1rem;margin:8px 0 8px">Traffic chart</h2>
          <p style="color:var(--gray);font-size:0.82rem;margin:0 0 12px;line-height:1.45">
            <strong>Day</strong> = last 30 days · <strong>Week</strong> = 12 weeks (Mon–Sun) · <strong>Month</strong> = 12 calendar months. Bars show page views (blue) and batched clicks (amber).</p>
          <div class="tabs" style="margin-bottom:12px">
            <button type="button" class="btn btn-ghost visit-chart-tab active" data-period="day">Day</button>
            <button type="button" class="btn btn-ghost visit-chart-tab" data-period="week">Week</button>
            <button type="button" class="btn btn-ghost visit-chart-tab" data-period="month">Month</button>
          </div>
          <div style="height:300px;position:relative;margin-bottom:20px">
            <canvas id="visitChart"></canvas>
          </div>
          <h2 style="font-size:1rem;margin-bottom:10px">Recent events</h2>
          <table><thead><tr><th>Time</th><th>Visitor ID</th><th>Path</th><th>Type</th><th>IP</th><th>User agent</th><th>Referrer</th></tr></thead><tbody>${rows}</tbody></table>
          <div class="pager" style="display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap">
            <button type="button" class="btn btn-ghost" id="vgPrev"${pgPrevDis}>Previous</button>
            <span style="font-size:0.88rem;color:var(--gray)">Page <strong>${data.page}</strong> of <strong>${data.totalPages}</strong> · ${data.total} events (${data.limit} per page)</span>
            <button type="button" class="btn btn-ghost" id="vgNext"${pgNextDis}>Next</button>
          </div></div>`;
        const vprev = document.getElementById('vgPrev');
        const vnext = document.getElementById('vgNext');
        if (vprev) vprev.addEventListener('click', () => tabVisits(data.page - 1));
        if (vnext) vnext.addEventListener('click', () => tabVisits(data.page + 1));
        document.querySelectorAll('.visit-chart-tab').forEach((btn) => {
          btn.addEventListener('click', async () => {
            document.querySelectorAll('.visit-chart-tab').forEach((b) => b.classList.remove('active'));
            btn.classList.add('active');
            await loadVisitChart(btn.getAttribute('data-period'));
          });
        });
        await loadVisitChart('day');
      }

      async function tabCv() {
        const { applications } = await TLL.api('/api/admin/applications');
        const rows = applications.length
          ? applications
              .map(
                (a) =>
                  `<tr><td>${new Date(a.createdAt).toLocaleString()}</td><td>${a.name}</td><td>${a.email}</td><td>${a.position}</td><td><a href="/${a.cvPath}" target="_blank" rel="noopener">CV</a></td></tr>`
              )
              .join('')
          : '<tr><td colspan="5">No applications yet.</td></tr>';
        document.getElementById('tab-cv').innerHTML = `<div class="card"><h1>Career CV submissions</h1>
          <table><thead><tr><th>Date</th><th>Name</th><th>Email</th><th>Role</th><th>File</th></tr></thead><tbody>${rows}</tbody></table></div>`;
      }

      tabNote();
      await tabUsers();
      await tabShip();
      await tabCv();
    })();
  </script>
</body>
</html>
