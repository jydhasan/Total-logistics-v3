<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Web Admin</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .box {
      width: 300px;
      padding: 20px;
      border: 1px solid #ccc;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<h2>Admin Panel</h2>

<div class="box">

  <input type="text" id="tracking_number" placeholder="Tracking Number">
  <input type="text" id="description" placeholder="Description">

  <button onclick="submitData()">Upload</button>

  <p id="msg"></p>
</div>

<script>
async function submitData() {
  const data = {
    tracking_number: document.getElementById("tracking_number").value,
    description: document.getElementById("description").value
  };

  const res = await fetch("http://localhost:3000/api/shipment", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const result = await res.json();

  document.getElementById("msg").innerText =
    res.ok ? "Uploaded Successfully ✅" : "Error ❌";
}
</script>

</body>
</html>
