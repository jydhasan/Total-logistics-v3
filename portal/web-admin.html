<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quote Requests - Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --primary: #2c3e50;
      --accent: #3498db;
      --success: #2ecc71;
      --danger: #e74c3c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f4f6f9;
      color: #333;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 15px;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 1rem 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    h1 {
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Upload Card */
    .upload-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      margin-bottom: 25px;
    }

    .upload-card h2 {
      margin-bottom: 15px;
      color: var(--primary);
      font-size: 1.3rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }

    button {
      padding: 12px;
      background: var(--success);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.3s;
    }

    button:hover {
      background: #27ae60;
      transform: translateY(-2px);
    }

    /* Cards Section */
    .quotes-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
    }

    .quote-card {
      background: white;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .quote-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }

    .date {
      font-size: 0.9rem;
      color: #666;
    }

    .status {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .new { background: #e3f2fd; color: #1565c0; }

    .card-body h3 {
      margin-bottom: 10px;
      color: var(--primary);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 0.95rem;
    }

    .info-label {
      color: #555;
      font-weight: 500;
    }

    .route {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 8px;
      margin: 12px 0;
      text-align: center;
      font-weight: 600;
      color: var(--primary);
    }

    .message {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eee;
      font-size: 0.95rem;
      color: #444;
      line-height: 1.5;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .quotes-container {
        grid-template-columns: 1fr;
      }

      .quote-card {
        margin-bottom: 15px;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 10px;
      }
    }

    .success-msg {
      color: var(--success);
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header>
      <h1><i class="fas fa-user-shield"></i> Admin Panel</h1>
      <div>
        <span style="opacity:0.9; font-size:0.95rem;">Welcome, Admin</span>
      </div>
    </header>

    <!-- Upload Section -->
    <div class="upload-card">
      <h2><i class="fas fa-upload"></i> Add Shipment Data</h2>
      <div class="form-grid">
        <input type="text" id="tracking_number" placeholder="Tracking Number">
        <input type="text" id="description" placeholder="Description">
      </div>
      <button onclick="submitData()">
        <i class="fas fa-cloud-upload-alt"></i> Upload Data
      </button>
      <p id="msg" class="success-msg"></p>
    </div>

    <!-- Quotes Section -->
    <div class="table-header" style="margin-bottom: 20px; background: var(--primary); color: white; padding: 15px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center;">
      <h2><i class="fas fa-envelope"></i> All Quote Requests</h2>
      <button class="refresh-btn" onclick="loadQuotes()" style="background: var(--accent); border: none; padding: 10px 18px; border-radius: 8px; color: white; cursor: pointer;">
        <i class="fas fa-sync"></i> Refresh
      </button>
    </div>

    <div class="quotes-container" id="quotesContainer">
      <!-- Cards will be injected here by JavaScript -->
    </div>
  </div>

  <script>
    async function loadQuotes() {
      try {
        const response = await fetch('/api/quotes');
        const quotes = await response.json();

        const container = document.getElementById('quotesContainer');
        container.innerHTML = '';

        if (quotes.length === 0) {
          container.innerHTML = `
            <div style="grid-column: 1 / -1; text-align:center; padding:60px; color:#777; font-size:1.1rem;">
              No quote requests yet
            </div>`;
          return;
        }

        quotes.forEach(q => {
          const date = new Date(q.timestamp).toLocaleString('en-GB', {
            day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
          });

          const card = `
            <div class="quote-card">
              <div class="card-header">
                <div class="date"><i class="fas fa-clock"></i> ${date}</div>
                <span class="status new">New</span>
              </div>

              <div class="card-body">
                <h3>${q.name}</h3>
                
                ${q.company ? `<p style="color:#555; margin-bottom:8px;"><strong>Company:</strong> ${q.company}</p>` : ''}

                <div class="info-row">
                  <span class="info-label">📞 Phone</span>
                  <span>${q.phone}</span>
                </div>
                <div class="info-row">
                  <span class="info-label">✉️ Email</span>
                  <span>${q.email}</span>
                </div>

                <div class="info-row">
                  <span class="info-label">Service</span>
                  <span><strong>${q.service}</strong></span>
                </div>

                <div class="route">
                  ${q.origin || 'N/A'} <i class="fas fa-arrow-right"></i> ${q.destination || 'N/A'}
                </div>

                ${q.message ? `
                <div class="message">
                  <strong>Message:</strong><br>
                  ${q.message}
                </div>` : ''}
              </div>
            </div>
          `;

          container.innerHTML += card;
        });

      } catch (err) {
        console.error(err);
        alert("Failed to load data. Make sure the server is running.");
      }
    }

    async function submitData() {
      const data = {
        tracking_number: document.getElementById("tracking_number").value.trim(),
        description: document.getElementById("description").value.trim()
      };

      if (!data.tracking_number) {
        document.getElementById("msg").innerHTML = `<span style="color:red;">Tracking number is required</span>`;
        return;
      }

      const res = await fetch("http://localhost:3000/api/shipment", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const msgEl = document.getElementById("msg");

      if (res.ok) {
        msgEl.innerHTML = `✅ Uploaded Successfully`;
        document.getElementById("tracking_number").value = '';
        document.getElementById("description").value = '';
      } else {
        msgEl.innerHTML = `❌ Upload Failed`;
      }

      setTimeout(() => msgEl.innerHTML = '', 5000);
    }

    // Load data when page opens
    window.onload = loadQuotes;
  </script>
</body>
</html>
